name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  ignored-backlog:
    # The marked-failing "crack-finder" tests: known gaps with no fix yet.
    # Non-blocking — a failure here is expected and informational. When one of
    # these starts PASSING, the underlying bug is fixed and its #[ignore] should
    # be removed so it joins the required `build` gate.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v6
    - name: Run marked-failing backlog
      run: cargo test --verbose -- --ignored

  docker:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v6
    - name: Set up Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
    - name: Log in to GHCR
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Image metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=raw,value=latest
          type=sha
    # Persist the BuildKit cargo cache mounts (registry/git + per-stage target)
    # across runs. Rolling key: refreshes on dependency changes, and the per-sha
    # suffix lets each run save newly compiled artifacts (actions/cache entries
    # are immutable, so a stable key would never pick up incremental work).
    - name: Cache cargo mounts
      id: cargo-cache
      uses: actions/cache@v5
      with:
        path: .docker-cache
        key: cargo-mounts-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-${{ github.sha }}
        restore-keys: |
          cargo-mounts-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}-
          cargo-mounts-${{ runner.os }}-
    - name: Inject cargo cache into BuildKit
      uses: reproducible-containers/buildkit-cache-dance@v3.4.0
      with:
        builder: ${{ steps.buildx.outputs.name }}
        cache-map: |
          {
            ".docker-cache/registry": { "target": "/usr/local/cargo/registry", "id": "cargo-registry" },
            ".docker-cache/git": { "target": "/usr/local/cargo/git", "id": "cargo-git" },
            ".docker-cache/target-client": { "target": "/app/target", "id": "cargo-target-client" },
            ".docker-cache/target-server": { "target": "/app/target", "id": "cargo-target-server" }
          }
        skip-extraction: ${{ steps.cargo-cache.outputs.cache-hit }}
    - name: Build and push
      uses: docker/build-push-action@v7
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
